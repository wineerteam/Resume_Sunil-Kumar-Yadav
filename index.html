<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunil Kumar Yadav | Resume</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        header {
            background: #111;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .container {
            height: calc(100vh - 60px);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .btn {
            position: fixed;
            top: 15px;
            right: 20px;
            background: #00c853;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
        }

        .btn:hover {
            background: #009624;
        }
    </style>
</head>

<body>

    <header>
        Sunil Kumar Yadav - Resume
    </header>

    <!-- Download Button -->
    <a class="btn" href="resume.pdf" download>Download PDF</a>

    <!-- Resume Viewer -->
    <div class="container">
        <iframe src="resume.pdf"></iframe>
    </div>

</body>
</html>
